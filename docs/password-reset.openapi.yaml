openapi: 3.0.3
info:
  title: PluMedica Password Reset API
  version: 1.0.0
servers:
  - url: http://localhost:5000
components:
  schemas:
    ForgotPasswordRequest:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          description: Email or E.164 phone number
          example: doctor@example.com
    ResetPasswordRequest:
      type: object
      required: [token, newPassword, confirmPassword]
      properties:
        token:
          type: string
          pattern: '^[a-f0-9]{64}$'
          example: 98f66b205c26cf95a4630f7661c4a2d322ea36781dc1168be6f7f15e2e8af6a7
        newPassword:
          type: string
          minLength: 8
          example: StrongP@ssword123
        confirmPassword:
          type: string
          minLength: 8
          example: StrongP@ssword123
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: If the account exists, reset instructions have been sent
        data:
          type: object
          additionalProperties: true
          example: {}
        errorCode:
          nullable: true
          type: string
          example: null
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid reset token format
        data:
          type: object
          additionalProperties: true
          example: {}
        errorCode:
          type: string
          example: INVALID_RESET_TOKEN_FORMAT
paths:
  /api/admin/forgot-password:
    post:
      summary: Admin forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Generic success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/reset-password:
    post:
      summary: Admin reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid token or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/forgot-password:
    post:
      summary: User forgot password
      requestBody:
